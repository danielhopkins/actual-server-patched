name: Build and publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream actual tag to build (e.g. v26.4.0). Leave blank for latest."
        required: false
        type: string
  schedule:
    - cron: "0 13 * * *"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/actual-server-patched

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve upstream tag
        id: tag
        run: |
          if [ -n "${{ inputs.upstream_tag }}" ]; then
            TAG="${{ inputs.upstream_tag }}"
          else
            TAG=$(curl -fsSL https://api.github.com/repos/actualbudget/actual/releases/latest | jq -r .tag_name)
          fi
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Failed to resolve upstream tag" >&2
            exit 1
          fi
          echo "upstream_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building against upstream $TAG"

      - name: Check if image already exists
        id: existing
        if: github.event_name == 'schedule'
        run: |
          TAG="${{ steps.tag.outputs.upstream_tag }}"
          TOKEN=$(echo -n "${{ secrets.GITHUB_TOKEN }}" | base64 -w0)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "https://ghcr.io/v2/${{ github.repository_owner }}/actual-server-patched/manifests/$TAG")
          if [ "$STATUS" = "200" ]; then
            echo "Image for $TAG already exists, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.existing.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.existing.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.existing.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.existing.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            UPSTREAM_TAG=${{ steps.tag.outputs.upstream_tag }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.upstream_tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
